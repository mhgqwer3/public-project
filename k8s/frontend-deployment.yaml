apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  namespace: smart-bins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
        - name: front
          image: mohammedkhaled978/smart-bins-frontend:latest
          ports:
            - containerPort: 80


---
apiVersion: v1
kind: Service
metadata:
  name: front-service
  namespace: smart-bins
spec:
  type: NodePort
  selector:
    app: front
  ports:
    - port: 80
      targetPort: 80
